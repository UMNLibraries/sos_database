name: Save backup of production DB to S3 bucket

on:
  # schedule:
  #   - cron: '2 */3 * * *' # 2 minutes past ever three hours
  
  # Define when the workflow should run (e.g., manual trigger)
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

jobs:
  run_django_backup:
    environment: get_form_update_env

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' # Specify your Python version

    - name: Install gdal
      run: |
        sudo apt-add-repository ppa:ubuntugis/ubuntugis-unstable
        sudo apt update
        sudo apt install gdal-bin libgdal-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If your manage.py is not in the root directory, adjust the path (e.g., cd src; pip install -r requirements.txt)

    # - name: Move Box private key to file
    #   # Pass the secret as an environment variable to prevent it from
    #   # being exposed in the logs if it were used directly in the run command.
    #   env:
    #     BOX_KEY: ${{ secrets.BOX_KEY }}
    #   run: |
    #     echo "$BOX_KEY" > sos_database/settings/box_cert.pem
    #   shell: bash

    - name: Run the Django management command
      run: |
        # Navigate to directory containing manage.py if necessary (e.g., cd src)
        python manage.py dbbackup
      # Ensure environment variables from the 'Configure Django settings' step are available
      env:
        # Pass other required env vars
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_HOST: ${{ secrets.DB_HOST }}
        # BOX_JWT: ${{ secrets.BOX_JWT }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_S3_REGION_NAME: ${{ vars.AWS_S3_REGION_NAME }}
        # BOX_FORM_RESPONSES_FILE_ID: ${{ vars.BOX_FORM_RESPONSES_FILE_ID }}
        # BOX_FORM_IMAGES_FOLDER_ID: ${{ vars.BOX_FORM_IMAGES_FOLDER_ID }}
        AWS_STORAGE_BUCKET_NAME: ${{ vars.AWS_STORAGE_BUCKET_NAME }}
        DBBACKUP_SERVER_EMAIL: ${{ vars.DBBACKUP_SERVER_EMAIL }}
